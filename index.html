<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动应用程序管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 20px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 18px 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        
        tbody tr {
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background: #f8f9ff;
            transform: scale(1.01);
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-no {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-yes {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .process-name {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }
        
        .path-cell {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #555;
            word-break: break-all;
            max-width: 500px;
        }
        
        .index-cell {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            th, td {
                padding: 12px 10px;
                font-size: 0.9rem;
            }
            
            .path-cell {
                max-width: 200px;
                font-size: 0.8rem;
            }
            
            .stat-card {
                padding: 15px 25px;
            }
            
            .stat-number {
                font-size: 2rem;
            }
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 启动应用程序管理</h1>
        <p class="subtitle">管理系统启动时自动运行的应用程序</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">2</div>
                <div class="stat-label">总程序数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="enabledCount">0</div>
                <div class="stat-label">已启用</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="disabledCount">2</div>
                <div class="stat-label">已禁用</div>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>是否启动</th>
                        <th>进程名称</th>
                        <th>程序路径</th>
                    </tr>
                </thead>
                <tbody id="appTableBody">
                    <!-- 数据将通过JavaScript动态插入 -->
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>© 2026 启动应用程序管理系统 | 数据最后更新: 2026-04-09</p>
        </div>
    </div>

    <script>
        // 应用程序数据
        const appData = [
            {
                index: 1,
                enabled: false,
                processName: "WorkBuddy.exe",
                path: "C:\\Users\\lenovo\\AppData\\Local\\Programs\\WorkBuddy\\WorkBuddy.exe"
            },
            {
                index: 2,
                enabled: false,
                processName: "AweSun.exe",
                path: "D:\\Program Files\\Oray\\AweSun\\AweSun.exe"
            }
        ];

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('appTableBody');
            tbody.innerHTML = appData.map(app => `
                <tr>
                    <td class="index-cell">#${app.index}</td>
                    <td>
                        <span class="status ${app.enabled ? 'status-yes' : 'status-no'}">
                            ${app.enabled ? '✓ 是' : '✗ 否'}
                        </span>
                    </td>
                    <td><span class="process-name">${app.processName}</span></td>
                    <td class="path-cell">${app.path}</td>
                </tr>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const total = appData.length;
            const enabled = appData.filter(app => app.enabled).length;
            const disabled = total - enabled;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('enabledCount').textContent = enabled;
            document.getElementById('disabledCount').textContent = disabled;
        }

        // 初始化
        renderTable();
        updateStats();
    </script>
</body>
</html>
