<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>启动应用程序管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        .btn-add {
            display: block;
            margin: 0 auto 20px;
            padding: 12px 30px;
            background: #fff;
            color: #667eea;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        th {
            padding: 20px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 18px 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        
        tbody tr {
            transition: all 0.3s ease;
        }
        
        tbody tr:hover {
            background: #f8f9ff;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-否 {
            background: #ffebee;
            color: #c62828;
        }
        
        .status-是 {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-重启 {
            background: #fff3e0;
            color: #e65100;
        }
        
        .process-name {
            font-weight: 600;
            color: #667eea;
            font-family: 'Courier New', monospace;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }
        
        .path-cell {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #555;
            word-break: break-all;
            max-width: 400px;
        }
        
        .index-cell {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1rem;
        }
        
        .btn-edit, .btn-delete, .btn-save, .btn-cancel {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-right: 5px;
        }
        
        .btn-edit {
            background: #667eea;
            color: white;
        }
        
        .btn-edit:hover {
            background: #5a6fd6;
        }
        
        .btn-delete {
            background: #ef5350;
            color: white;
        }
        
        .btn-delete:hover {
            background: #e53935;
        }
        
        .btn-save {
            background: #66bb6a;
            color: white;
        }
        
        .btn-save:hover {
            background: #4caf50;
        }
        
        .btn-cancel {
            background: #bdbdbd;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #9e9e9e;
        }
        
        .edit-select, .edit-input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            width: 100%;
            max-width: 150px;
        }
        
        .edit-input {
            max-width: 300px;
            font-family: 'Courier New', monospace;
        }
        
        .edit-select:focus, .edit-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .modal h2 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-confirm {
            background: #667eea;
            color: white;
        }
        
        .btn-confirm:hover {
            background: #5a6fd6;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            th, td {
                padding: 12px 10px;
                font-size: 0.9rem;
            }
            
            .path-cell {
                max-width: 150px;
                font-size: 0.8rem;
            }
            
            .stat-card {
                padding: 15px 25px;
            }
            
            .stat-number {
                font-size: 2rem;
            }
            
            .btn-edit, .btn-delete, .btn-save, .btn-cancel {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>启动应用程序管理</h1>
        <p class="subtitle">管理系统启动时自动运行的应用程序</p>
        
        <button class="btn-add" onclick="openAddModal()">+ 添加新程序</button>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总程序数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="enabledCount">0</div>
                <div class="stat-label">已启用</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="disabledCount">0</div>
                <div class="stat-label">已禁用</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="restartCount">0</div>
                <div class="stat-label">重启</div>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>启动选项</th>
                        <th>进程名称</th>
                        <th>程序路径</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="appTableBody">
                    <!-- 数据将通过JavaScript动态插入 -->
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <p>2026 启动应用程序管理系统 | 数据最后更新: 2026-04-09</p>
        </div>
    </div>

    <!-- 添加/编辑模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">添加新程序</h2>
            <form id="appForm" onsubmit="saveApp(event)">
                <input type="hidden" id="editIndex" value="">
                <div class="form-group">
                    <label for="appStatus">启动选项</label>
                    <select id="appStatus" required>
                        <option value="否">否</option>
                        <option value="是">是</option>
                        <option value="重启">重启</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="appName">进程名称</label>
                    <input type="text" id="appName" placeholder="例如: WorkBuddy.exe" required>
                </div>
                <div class="form-group">
                    <label for="appPath">程序路径</label>
                    <input type="text" id="appPath" placeholder="例如: C:\Program Files\App\app.exe" required>
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="btn-confirm">保存</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 应用程序数据
        let appData = [
            {
                index: 1,
                status: "否",
                processName: "WorkBuddy.exe",
                path: "C:\\Users\\lenovo\\AppData\\Local\\Programs\\WorkBuddy\\WorkBuddy.exe"
            },
            {
                index: 2,
                status: "否",
                processName: "AweSun.exe",
                path: "D:\\Program Files\\Oray\\AweSun\\AweSun.exe"
            }
        ];

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('appTableBody');
            tbody.innerHTML = appData.map((app, idx) => `
                <tr data-index="${idx}">
                    <td class="index-cell">${app.index}</td>
                    <td><span class="status status-${app.status}">${app.status}</span></td>
                    <td><span class="process-name">${app.processName}</span></td>
                    <td class="path-cell">${app.path}</td>
                    <td>
                        <button class="btn-edit" onclick="editApp(${idx})">编辑</button>
                        <button class="btn-delete" onclick="deleteApp(${idx})">删除</button>
                    </td>
                </tr>
            `).join('');
            updateStats();
        }

        // 更新统计
        function updateStats() {
            const total = appData.length;
            const enabled = appData.filter(app => app.status === "是").length;
            const disabled = appData.filter(app => app.status === "否").length;
            const restart = appData.filter(app => app.status === "重启").length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('enabledCount').textContent = enabled;
            document.getElementById('disabledCount').textContent = disabled;
            document.getElementById('restartCount').textContent = restart;
        }

        // 打开添加模态框
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加新程序';
            document.getElementById('appForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        // 编辑应用
        function editApp(idx) {
            const app = appData[idx];
            document.getElementById('modalTitle').textContent = '编辑程序';
            document.getElementById('editIndex').value = idx;
            document.getElementById('appStatus').value = app.status;
            document.getElementById('appName').value = app.processName;
            document.getElementById('appPath').value = app.path;
            document.getElementById('modalOverlay').classList.add('active');
        }

        // 保存应用
        function saveApp(event) {
            event.preventDefault();
            const idx = document.getElementById('editIndex').value;
            const status = document.getElementById('appStatus').value;
            const processName = document.getElementById('appName').value;
            const path = document.getElementById('appPath').value;
            
            if (idx === '') {
                // 添加新程序
                const newIndex = appData.length > 0 ? Math.max(...appData.map(a => a.index)) + 1 : 1;
                appData.push({
                    index: newIndex,
                    status: status,
                    processName: processName,
                    path: path
                });
            } else {
                // 更新现有程序
                appData[idx] = {
                    index: appData[idx].index,
                    status: status,
                    processName: processName,
                    path: path
                };
            }
            
            closeModal();
            renderTable();
        }

        // 删除应用
        function deleteApp(idx) {
            if (confirm('确定要删除这个程序吗？')) {
                appData.splice(idx, 1);
                // 重新编号
                appData.forEach((app, i) => {
                    app.index = i + 1;
                });
                renderTable();
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // 点击遮罩关闭模态框
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 初始化
        renderTable();
    </script>
</body>
</html>
